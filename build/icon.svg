<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0b1e4a"/>
    </linearGradient>
    <linearGradient id="bookA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bookB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fecaca"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="bookC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bbf7d0"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="14" result="offset"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="40" y="40" width="944" height="944" rx="200" ry="200" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Books group with shadow -->
  <g filter="url(#shadow)">
    <!-- Yellow book -->
    <rect x="260" y="310" width="120" height="420" rx="14" fill="url(#bookA)"/>
    <rect x="260" y="360" width="120" height="10" fill="#000" fill-opacity="0.18"/>
    <rect x="260" y="680" width="120" height="10" fill="#000" fill-opacity="0.18"/>

    <!-- Red book (taller) -->
    <rect x="400" y="260" width="130" height="470" rx="14" fill="url(#bookB)"/>
    <rect x="400" y="330" width="130" height="10" fill="#000" fill-opacity="0.2"/>
    <rect x="400" y="680" width="130" height="10" fill="#000" fill-opacity="0.2"/>

    <!-- Green book -->
    <rect x="550" y="340" width="120" height="390" rx="14" fill="url(#bookC)"/>
    <rect x="550" y="380" width="120" height="10" fill="#000" fill-opacity="0.18"/>
    <rect x="550" y="660" width="120" height="10" fill="#000" fill-opacity="0.18"/>
  </g>

  <!-- Shelf line -->
  <rect x="200" y="730" width="624" height="18" rx="6" fill="#ffffff" fill-opacity="0.92"/>
  <rect x="200" y="748" width="624" height="4" fill="#000" fill-opacity="0.25"/>

  <!-- Wi-Fi waves emanating from upper-right -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <circle cx="770" cy="254" r="18" fill="#ffffff" stroke="none"/>
    <path d="M 716 254 a 54 54 0 0 1 108 0" stroke-width="18" stroke-opacity="0.95"/>
    <path d="M 676 254 a 94 94 0 0 1 188 0" stroke-width="18" stroke-opacity="0.75"/>
    <path d="M 636 254 a 134 134 0 0 1 268 0" stroke-width="18" stroke-opacity="0.5"/>
  </g>
</svg>
